<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>快速原型预览</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #eff6ff;
      --green: #16a34a;
      --orange: #f97316;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      --shadow-hover: 0 14px 34px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 34%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }

    .page {
      max-width: 1160px;
      margin: 0 auto;
      padding: 56px 24px 72px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
      margin-bottom: 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 14px;
      border: 1px solid #dbeafe;
      border-radius: 999px;
      background: rgba(239, 246, 255, 0.8);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
    }

    .title {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
    }

    .desc {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .count {
      flex: 0 0 auto;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--border);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar { margin: 0 0 20px; }

    .search {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font-size: 14px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.04);
    }

    .search:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .version-list {
      display: grid;
      gap: 18px;
    }

    .version-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .version-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .version-title {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .version-title h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.35;
    }

    .version-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.version { background: var(--primary-light); color: var(--primary-dark); }
    .badge.draft { background: #ffedd5; color: #c2410c; }
    .badge.ready { background: #dcfce7; color: #15803d; }

    .version-summary {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .asset-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 18px;
    }

    .asset {
      display: flex;
      gap: 14px;
      min-height: 132px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    a.asset:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.55);
      box-shadow: var(--shadow-hover);
    }

    .asset.disabled {
      background: #f8fafc;
      color: #98a2b3;
    }

    .asset-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 900;
      font-size: 13px;
      flex: 0 0 auto;
    }

    .asset.disabled .asset-icon {
      background: #eef2f7;
      color: #98a2b3;
    }

    .asset-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .asset h3 {
      margin: 0 0 6px;
      font-size: 16px;
      line-height: 1.35;
    }

    .asset p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .asset.disabled p { color: #98a2b3; }

    .asset-footer {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-top: auto;
      padding-top: 14px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
    }

    .asset.disabled .asset-footer { color: #98a2b3; }

    .path {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #9ca3af;
      font-weight: 400;
    }

    .empty {
      display: none;
      padding: 24px;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.62);
    }

    .tips {
      margin-top: 26px;
      padding: 16px 18px;
      border: 1px solid #e0e7ff;
      border-radius: 16px;
      background: rgba(238, 242, 255, 0.7);
      color: #475569;
      font-size: 13px;
      line-height: 1.8;
    }

    code {
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.06);
      color: #1e293b;
    }

    @media (max-width: 760px) {
      .page { padding: 34px 16px 48px; }
      .header { display: block; }
      .count { display: inline-flex; margin-top: 16px; }
      .title { font-size: 28px; }
      .version-head { grid-template-columns: 1fr; }
      .asset-grid { grid-template-columns: 1fr; }
      .asset { min-height: 0; }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <div>
        <div class="eyebrow">@灰原出品 · Versioned Prototype Studio</div>
        <h1 class="title">快速原型预览</h1>
        <p class="desc">按版本管理 PRD 文档，并在同一版本下关联对应的 HTML 原型，便于评审、演示和归档。</p>
      </div>
      <div class="count" id="versionCount">0 个版本</div>
    </header>

    <section class="toolbar">
      <input class="search" id="searchInput" type="search" placeholder="搜索版本、PRD、原型名称或关键词..." />
    </section>

    <section class="version-list" id="versionList"></section>

    <div class="empty" id="emptyState">没有匹配的版本或原型，请换个关键词试试。</div>

    <section class="tips">
      维护方式：只需要修改页面底部脚本里的 <code>versions</code> 配置数组。新增版本时复制一个对象；对应 HTML 原型产出后，把该版本 <code>assets</code> 里的占位项改成带 <code>href</code> 的可点击项。
      推荐文件命名：<code>项目名_V1.0_PRD.html</code>、<code>项目名_V1.0_原型.html</code>。
    </section>
  </main>

  <script>
    const versions = [
      {
        version: "V1.0",
        title: "ToB 全链路效能中心",
        status: "草稿 / 待评审",
        statusType: "draft",
        date: "2026-07-01",
        productManager: "谢慧源",
        contacts: "王奕玮",
        summary: "围绕客户、线索、商机、合同、项目、交付、验收、收入、售后等核心对象，建设统一的业务链路还原、效能分析、偏差检测、风险预警和治理闭环能力。",
        keywords: "ToB 全链路 效能中心 PRD HTML 原型 草稿 待评审",
        assets: [
          {
            type: "PRD",
            title: "V1.0 PRD 文档",
            desc: "查看需求背景、范围边界、业务流程、功能需求、数据规则、权限设计、接口集成、验收标准和上线计划。",
            href: "./ToB_全链路效能中心_PRD.html",
            action: "打开 PRD →"
          },
          {
            type: "HTML",
            title: "V1.0 HTML 原型",
            desc: "查看全链路效能中心的交互原型，覆盖总览、链路分析、实例追踪、偏差检测、预警中心和规则配置等核心页面。",
            href: "./ToB_全链路效能中心_V1.0_原型.html",
            action: "打开原型 →"
          }
        ]
      },
      {
        version: "V1.0",
        title: "ToB 移动端工作台与商机创建",
        status: "草稿 / 待评审",
        statusType: "draft",
        date: "2026-07-01",
        productManager: "谢慧源",
        contacts: "王奕玮、陈永良",
        summary: "面向客户经理、交付经理和业务管理者的移动端高频业务入口，覆盖工作台、业务看板、审批待办、应用聚合，以及移动端创建商机分步向导。",
        keywords: "ToB 移动端 首页 工作台 创建商机 PRD HTML 原型 草稿 待评审",
        assets: [
          {
            type: "PRD",
            title: "V1.0 移动端 PRD 文档",
            desc: "查看移动端首页、业务入口、审批待办、应用聚合和创建商机分步向导的需求说明、字段规则、交互规则与验收标准。",
            href: "./ToB_移动端工作台与商机创建_PRD.html",
            action: "打开 PRD →"
          },
          {
            type: "HOME",
            title: "V1.0 移动端首页原型",
            desc: "查看 ToB 移动端首页工作台原型，包含首页、业务、审批、应用、我的五个底部导航页面。",
            href: "./ToB_移动端首页_V1.0_原型.html",
            action: "打开原型 →"
          },
          {
            type: "FORM",
            title: "V1.0 移动端创建商机原型",
            desc: "查看移动端创建商机分步向导，覆盖基础信息、预估收入、团队成员、扩展信息、协同事项、拜访信息和确认提交。",
            href: "./ToB_移动端创建商机_V1.0_原型.html",
            action: "打开原型 →"
          }
        ]
      }
    ];

    const searchInput = document.getElementById("searchInput");
    const versionList = document.getElementById("versionList");
    const emptyState = document.getElementById("emptyState");
    const count = document.getElementById("versionCount");
    let versionCards = [];

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderAsset(asset) {
      const content = `
        <div class="asset-icon">${escapeHtml(asset.type)}</div>
        <div class="asset-body">
          <h3>${escapeHtml(asset.title)}</h3>
          <p>${escapeHtml(asset.desc)}</p>
          <div class="asset-footer">
            <span>${escapeHtml(asset.action)}</span>
            <span class="path">${escapeHtml(asset.path || asset.href || "")}</span>
          </div>
        </div>
      `;

      if (asset.disabled) {
        return `<div class="asset disabled" aria-disabled="true">${content}</div>`;
      }

      return `<a class="asset" href="${escapeHtml(asset.href)}">${content}</a>`;
    }

    function renderVersions() {
      versionList.innerHTML = versions.map((item) => `
        <article class="version-card" data-keywords="${escapeHtml([item.version, item.title, item.status, item.keywords].join(" "))}">
          <div class="version-head">
            <div>
              <div class="version-title">
                <span class="badge version">${escapeHtml(item.version)}</span>
                <h2>${escapeHtml(item.title)}</h2>
                <span class="badge ${escapeHtml(item.statusType || "ready")}">${escapeHtml(item.status)}</span>
              </div>
              <p class="version-summary">${escapeHtml(item.summary)}</p>
            </div>
            <div class="version-meta">
              <span>创建日期：${escapeHtml(item.date)}</span>
              <span>产品经理：${escapeHtml(item.productManager)}</span>
              <span>接口人：${escapeHtml(item.contacts)}</span>
            </div>
          </div>
          <div class="asset-grid">${item.assets.map(renderAsset).join("")}</div>
        </article>
      `).join("");
      versionCards = Array.from(versionList.querySelectorAll(".version-card"));
    }

    function updateCount(visibleCount) {
      count.textContent = visibleCount + " 个版本";
    }

    function filterVersions() {
      const keyword = searchInput.value.trim().toLowerCase();
      let visibleCount = 0;

      versionCards.forEach((card) => {
        const text = (card.innerText + " " + (card.dataset.keywords || "")).toLowerCase();
        const matched = !keyword || text.includes(keyword);
        card.style.display = matched ? "block" : "none";
        if (matched) visibleCount += 1;
      });

      emptyState.style.display = visibleCount === 0 ? "block" : "none";
      updateCount(visibleCount);
    }

    renderVersions();
    searchInput.addEventListener("input", filterVersions);
    updateCount(versionCards.length);
  </script>
</body>
</html>
