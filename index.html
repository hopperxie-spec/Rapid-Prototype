<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>快速原型预览</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-light: #eff6ff;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      --shadow-hover: 0 14px 34px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 34%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 56px 24px 72px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
      margin-bottom: 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 14px;
      border: 1px solid #dbeafe;
      border-radius: 999px;
      background: rgba(239, 246, 255, 0.8);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
    }

    .title {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .desc {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .actions {
      flex: 0 0 auto;
      display: flex;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .count {
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--border);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
    }

    .toolbar {
      margin: 0 0 20px;
    }

    .search {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      font-size: 14px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.04);
    }

    .search:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      min-height: 178px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(37, 99, 235, 0.55);
      box-shadow: var(--shadow-hover);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 800;
      font-size: 16px;
    }

    .tag {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #4b5563;
      font-size: 12px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.35;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .card-footer {
      margin-top: auto;
      padding-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
    }

    .path {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #9ca3af;
      font-weight: 400;
    }

    .empty {
      display: none;
      padding: 24px;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.62);
    }

    .tips {
      margin-top: 26px;
      padding: 16px 18px;
      border: 1px solid #e0e7ff;
      border-radius: 16px;
      background: rgba(238, 242, 255, 0.7);
      color: #475569;
      font-size: 13px;
      line-height: 1.8;
    }

    code {
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.06);
      color: #1e293b;
    }

    @media (max-width: 720px) {
      .page {
        padding: 34px 16px 48px;
      }

      .header {
        display: block;
      }

      .actions {
        margin-top: 16px;
      }

      .title {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <div>
        <div class="eyebrow">HTML Prototype Preview</div>
        <h1 class="title">快速原型预览</h1>
        <p class="desc">用于统一管理和预览多个 HTML 原型、PRD 页面和交互 Demo。</p>
      </div>
      <div class="actions">
        <span class="count" id="prototypeCount">0 个原型</span>
      </div>
    </header>

    <section class="toolbar">
      <input class="search" id="searchInput" type="search" placeholder="搜索原型名称、说明或标签..." />
    </section>

    <section class="grid" id="prototypeGrid">
      <a class="card" href="./ToB_全链路效能中心_PRD.html" data-keywords="ToB 全链路 效能中心 PRD 原型">
        <div class="card-top">
          <div class="icon">PRD</div>
          <span class="tag">PRD 原型</span>
        </div>
        <h2>ToB 全链路效能中心 PRD</h2>
        <p>查看全链路效能中心 PRD 原型与交互页面。</p>
        <div class="card-footer">
          <span>打开预览 →</span>
          <span class="path">./ToB_全链路效能中心_PRD.html</span>
        </div>
      </a>

      <!--
        后续新增 HTML 时，复制下面这段卡片，放到 prototypeGrid 里面即可。

        示例：
        <a class="card" href="./customer-research.html" data-keywords="客户调研中心 Web 原型">
          <div class="card-top">
            <div class="icon">WEB</div>
            <span class="tag">Web 原型</span>
          </div>
          <h2>客户调研中心</h2>
          <p>查看客户调研中心交互原型。</p>
          <div class="card-footer">
            <span>打开预览 →</span>
            <span class="path">./customer-research.html</span>
          </div>
        </a>
      -->
    </section>

    <div class="empty" id="emptyState">没有匹配的原型，请换个关键词试试。</div>

    <section class="tips">
      使用说明：把这个文件命名为 <code>index.html</code> 并上传到仓库根目录。GitHub Pages 开启后，访问仓库主页链接即可进入这个目录页。
      后续上传新的 HTML 文件后，只需要在本页新增一个卡片入口。
    </section>
  </main>

  <script>
    const searchInput = document.getElementById("searchInput");
    const grid = document.getElementById("prototypeGrid");
    const cards = Array.from(grid.querySelectorAll(".card"));
    const emptyState = document.getElementById("emptyState");
    const count = document.getElementById("prototypeCount");

    function updateCount(visibleCount) {
      count.textContent = visibleCount + " 个原型";
    }

    function filterCards() {
      const keyword = searchInput.value.trim().toLowerCase();
      let visibleCount = 0;

      cards.forEach((card) => {
        const text = (card.innerText + " " + (card.dataset.keywords || "")).toLowerCase();
        const matched = !keyword || text.includes(keyword);
        card.style.display = matched ? "flex" : "none";
        if (matched) visibleCount += 1;
      });

      emptyState.style.display = visibleCount === 0 ? "block" : "none";
      updateCount(visibleCount);
    }

    searchInput.addEventListener("input", filterCards);
    updateCount(cards.length);
  </script>
</body>
</html>
